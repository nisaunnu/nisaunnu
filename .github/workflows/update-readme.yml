name: Update Terminal Git Log

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # ÖNEMLİ: Gerçek git log alabilmemiz için tüm geçmişi indirmesini sağlıyoruz
          fetch-depth: 0 
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Fetch Commits and Update README
        run: |
          python -c '
          import urllib.request, json, re, subprocess
          
          print("GitHub APIye baglaniliyor...")
          url = "https://api.github.com/users/nisaunnu/events/public?per_page=100"
          req = urllib.request.Request(url, headers={"User-Agent": "Nisa-Github-Action"})
          
          commits_text = ""
          try:
              with urllib.request.urlopen(req) as response:
                  events = json.loads(response.read().decode())
                  
              count = 0
              for event in events:
                  if event.get("type") == "PushEvent":
                      # KeyError/NameError almamak için güvenli .get zinciri
                      repo_name = event.get("repo", {}).get("name", "repo").split("/")[-1]
                      commits = event.get("payload", {}).get("commits", [])
                      for commit in commits:
                          if count >= 5: break
                          sha = commit.get("sha", "0000000")[:7]
                          msg = commit.get("message", "Guncelleme").split("\n")[0]
                          commits_text += f"{sha} {msg} · repo: {repo_name}\n"
                          count += 1
                  if count >= 5: break
          except Exception as e:
              print("API Baglanti Hatasi:", e)
          
          # EĞER API İNAT EDİP VERİYİ GETİRMEZSE: GERÇEK GİT LOG KULLAN!
          if not commits_text.strip():
              print("API guncel commitleri dondurmedi. Lokal git gecmisi kullaniliyor...")
              # Doğrudan sistemin terminalinde git log çalıştırıyoruz
              result = subprocess.run(["git", "log", "--oneline", "-5"], capture_output=True, text=True)
              if result.returncode == 0 and result.stdout.strip():
                  commits_text = result.stdout
              else:
                  commits_text = "Henuz gosterilecek bir commit yok."
                  
          print("Yazdirilacak Commitler:\n" + commits_text)
                  
          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()
          
          new_readme = re.sub(
              r"(<!--START_SECTION:activity-->).*?(<!--END_SECTION:activity-->)",
              f"\\1\n```text\n{commits_text.strip()}\n```\n\\2",
              readme,
              flags=re.DOTALL
          )
          
          if new_readme != readme:
              with open("README.md", "w", encoding="utf-8") as f:
                  f.write(new_readme)
              print("README.md basariyla guncellendi!")
          else:
              print("README.md dosyasinda degisecek bir sey yok.")
          '
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: terminal git log guncellendi" || exit 0
          git push