name: Update Terminal Git Log

on:
  schedule:
    - cron: '0 0 * * *' # Run it every day at midnight (once a day)
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Fetch Commits and Update README
        run: |
          python -c '
          import urllib.request, json, re, subprocess
          
          print("Connecting to the GitHub API...")
          url = "https://api.github.com/users/nisaunnu/events/public?per_page=100"
          req = urllib.request.Request(url, headers={"User-Agent": "Nisa-Github-Action"})
          
          commits_text = ""
          try:
              with urllib.request.urlopen(req) as response:
                  events = json.loads(response.read().decode())
                  
              count = 0
              for event in events:
                  if event.get("type") == "PushEvent":
                      repo_name = event.get("repo", {}).get("name", "repo").split("/")[-1]
                      commits = event.get("payload", {}).get("commits", [])
                      for commit in commits:
                          msg = commit.get("message", "Update").split("\n")[0]
                          
                          # FILTER THE BOT S OWN COMMITS:
                          if "github-actions: terminal git log updated" in msg:
                              continue
                              
                          if count >= 5: break
                          sha = commit.get("sha", "0000000")[:7]
                          commits_text += f"{sha} {msg} · repo: {repo_name}\n"
                          count += 1
                  if count >= 5: break
          except Exception as e:
              print("API Connection Error:", e)
          
          # IF THE API IS STUBBORN AND REFUSES TO RETRIEVE THE DATA:
          if not commits_text.strip():
              print("The API did not return the latest commits. Local git history is being used...")
              # We pull a wider list (20) and filter the bot from it.
              result = subprocess.run(["git", "log", "--oneline", "-20"], capture_output=True, text=True)
              if result.returncode == 0 and result.stdout.strip():
                  lines = result.stdout.strip().split("\n")
                  # Clear the bot s messages
                  filtered_lines = [line for line in lines if "github-actions: terminal git log updated" not in line]
                  commits_text = "\n".join(filtered_lines[:5])
              else:
                  commits_text = "There are no commits to show yet."
                  
          print("Commits to be printed:\n" + commits_text)
                  
          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()
          
          new_readme = re.sub(
              r"(<!--START_SECTION:activity-->).*?(<!--END_SECTION:activity-->)",
              f"\\1\n```text\n{commits_text.strip()}\n```\n\\2",
              readme,
              flags=re.DOTALL
          )
          
          if new_readme != readme:
              with open("README.md", "w", encoding="utf-8") as f:
                  f.write(new_readme)
              print("README.md has been successfully updated!")
          else:
              print("There are no new activities; the README remains the same.")
          '
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "github-actions: terminal git log updated" || exit 0
          git push